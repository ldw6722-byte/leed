<!DOCTYPE html>
<html>
<head>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    
    <script>
      var expression = "";

      function add(character) {
        expression = expression + character;
        document.getElementById("display").value = expression;
      }
      function compute() {
        document.getElementById("display").value = eval(expression);
      }
      function clearDisplay() {
        expression = "";
        document.getElementById("display").value = 0;
      }
    </script>
</head>

<body>
    <form>
        display <input id="display" value="0" size="60">
        <br>
        <input type="button" class="btn btn-primary" value=" 7 " onclick="add('7')">
        <input type="button" class="btn btn-primary" value=" 8 " onclick="add('8')">
        <input type="button" class="btn btn-primary" value=" 9 " onclick="add('9')">
        <input type="button" class="btn btn-primary" value=" / " onclick="add('/')">
        <br>
        <input type="button" class="btn btn-primary" value=" 4 " onclick="add('4')">
        <input type="button" class="btn btn-primary" value=" 5 " onclick="add('5')">
        <input type="button" class="btn btn-primary" value=" 6 " onclick="add('6')">
        <input type="button" class="btn btn-primary" value=" * " onclick="add('*')">
        <br>
        <input type="button" class="btn btn-primary" value=" 1 " onclick="add('1')">
        <input type="button" class="btn btn-primary" value=" 2 " onclick="add('2')">
        <input type="button" class="btn btn-primary" value=" 3 " onclick="add('3')">
        <input type="button" class="btn btn-primary" value=" - " onclick="add('-')">
        <br>
        <input type="button" class="btn btn-primary" value=" 0 " onclick="add('0')">
        <input type="button" class="btn btn-primary" value=" + " onclick="add('+')">
        <br>
        <input type="button" class="btn btn-primary" value="Clear" onclick="clearDisplay()">
        <input type="button" class="btn btn-primary" value="Enter" name="enter" onclick="compute()">
    </form>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
